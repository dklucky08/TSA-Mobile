<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>TSA MOBILE</title><style>body{background:#050608;color:#fff;font-family:sans-serif;padding:20px;}:root{--gold:#d4af37;}.gold{color:var(--gold);}.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;margin-bottom:15px;border-left:4px solid var(--gold);}</style></head><body><h2 class='gold'>⚓ ANCHOR TSA MOBILE</h2><div class='card'><h3>STATISTIK</h3><p id='t'>Tugas: --</p><p id='a'>TPP: --</p></div><div class='card'>GUARDIAN TPP</div><div class='card'>MISSION DECK</div><script>fetch('database/status.json').then(r=>r.json()).then(d=>{document.getElementById('t').innerText='Tugas Selesai: '+(d.tasks?d.tasks.length:0);let p=0;if(d.absen)d.absen.forEach(x=>p+=x.persen_potongan);document.getElementById('a').innerText='Potongan TPP: '+p.toFixed(2)+'%';});</script></body></html>
