<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>TSA MOBILE GOLD</title><link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap' rel='stylesheet'><link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css' rel='stylesheet'><style>body{background:#050608;color:#fff;font-family:'Inter',sans-serif;margin:0;padding:25px;}:root{--gold:#d4af37;}.logo{font-family:'Orbitron',sans-serif;font-size:1.8rem;color:var(--gold);text-align:center;letter-spacing:5px;margin-bottom:40px;}.card{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;margin-bottom:20px;}.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}.menu-item{display:flex;align-items:center;gap:20px;padding:15px;border-bottom:1px solid rgba(255,255,255,0.03);}.menu-icon{width:40px;height:40px;background:rgba(212,175,55,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);}</style></head><body><div class='logo'>ANCHOR</div><div class='stat-grid'><div class='card' style='text-align:center'><i class='fas fa-bolt-lightning' style='color:var(--gold)'></i><h2 id='t'>0</h2><small>MISI SELESAI</small></div><div class='card' style='text-align:center'><i class='fas fa-shield' style='color:#ff4b2b'></i><h2 id='p' style='color:#ff4b2b'>0.00%</h2><small>POTONGAN TPP</small></div></div><div class='card' style='padding:5px'><div class='menu-item'><div class='menu-icon'><i class='fas fa-calendar-check'></i></div><div><b>Guardian TPP</b><br><small style='color:#666'>Catatan & Kalkulasi</small></div></div><div class='menu-item'><div class='menu-icon'><i class='fas fa-list-ul'></i></div><div><b>Mission Deck</b><br><small style='color:#666'>50+ Tugas Aktif</small></div></div><div class='menu-item'><div class='menu-icon'><i class='fas fa-id-card'></i></div><div><b>Alat Kerja</b><br><small style='color:#666'>Personil & Vault</small></div></div></div><script>fetch('database/status.json').then(r=>r.json()).then(d=>{document.getElementById('t').innerText=d.tasks?d.tasks.length:0;let x=0;if(d.absen)d.absen.forEach(a=>x+=a.persen_potongan);document.getElementById('p').innerText=x.toFixed(2)+'%';}).catch(e=>console.log('Wait sync...'));</script></body></html>
