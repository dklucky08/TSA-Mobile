{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-200">
    <div class="flex items-center space-x-6 mb-10">
        <div class="bg-blue-100 p-4 rounded-2xl text-3xl">✉️</div>
        <div>
            <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">Menu 1 — Input Undangan</h2>
            <p class="text-slate-500 text-sm font-medium">Suntik data manual ke placeholder [In] template surat.</p> 
        </div>
    </div>

    <form action="/rapat/undangan/save" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Nomor Surat [In]</label>
            <input type="text" name="nomor_surat" value="{{ detail.get('nomor_surat', '') }}" placeholder="Contoh: 005/123-Diskominfo" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Sifat / Lampiran [In]</label>
            <input type="text" name="sifat_surat" value="{{ detail.get('sifat_surat', '') }}" placeholder="Penting / 1 Berkas" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="md:col-span-2">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Perihal [In]</label>
            <input type="text" name="perihal" value="{{ detail.get('perihal', '') }}" placeholder="Rapat Rekonsiliasi Aset Triwulan I" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Tanggal Pelaksanaan [In]</label>
            <input type="date" id="tgl_picker" name="tgl_rapat" value="{{ detail.get('tgl_rapat_raw', '') }}" 
                class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700"
                onchange="formatDateIndo(this.value)">
            <p id="tgl_preview" class="mt-2 px-4 text-[11px] font-black text-blue-600 italic uppercase tracking-tighter">
                {{ detail.get('tgl_rapat', 'Belum dipilih') }}
            </p>
        </div>
        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Waktu / Pukul [In]</label>
            <input type="text" name="waktu_rapat" value="{{ detail.get('waktu_rapat', '') }}" placeholder="08.00" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="md:col-span-2">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Daftar Undangan (Peserta Rapat)</label>
            <input type="hidden" name="daftar_undangan_ordered" id="daftar_undangan_ordered" value="">
            <select id="peserta_select" multiple="multiple" class="w-full">
                <option value="Kepala Dinas Komunikasi dan Informatika">0. Kepala Dinas Komunikasi dan Informatika</option>
                <option value="Kepala Subbagian Umum, Kepegawaian, dan Keuangan (Sekretariat)">1. Kepala Subbagian Umum, Kepegawaian, dan Keuangan (Sekretariat)</option>
                <option value="Kepala Subbagian Perencanaan, Evaluasi, dan Pelaporan (Sekretariat)">2. Kepala Subbagian Perencanaan, Evaluasi, dan Pelaporan (Sekretariat)</option>
                <option value="Bendahara Pengeluaran">3. Bendahara Pengeluaran</option>
                <option value="Pengampu Anggaran">4. Pengampu Anggaran</option>
                <option value="Pengampu Keuangan">5. Pengampu Keuangan</option>
                <option value="Kepala Bidang Informatika beserta Pengampu Kegiatan">6. Kepala Bidang Informatika beserta Pengampu Kegiatan</option>
                <option value="Kepala Bidang Informasi dan Komunikasi Publik (IKP) beserta Pengampu Kegiatan">7. Kepala Bidang Informasi dan Komunikasi Publik (IKP) beserta Pengampu Kegiatan</option>
                <option value="Staf">8. Staf</option>
                <option value="NULL">-- Khusus: Tanpa Daftar Hadir (NULL) --</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Tempat / Lokasi [In]</label>
            <input type="text" name="lokasi_rapat" value="{{ detail.get('lokasi_rapat', '') }}" placeholder="Ruang Command Center" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        
        <div class="md:col-span-2 flex justify-end mt-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-4 rounded-2xl font-black shadow-lg transition transform hover:-translate-y-1">
                💾 SIMPAN & LANJUT KE NOTULEN
            </button>
        </div>
    </form>
</div>

<script>
    $(document).ready(function() {
        var selectedOrder = [];
        
        var $select = $('#peserta_select').select2({
            placeholder: "Klik untuk tambah Peserta Rapat...",
            allowClear: true
        });
        
        $select.on('select2:select', function(e) {
            selectedOrder.push(e.params.data.id);
            $('#daftar_undangan_ordered').val(JSON.stringify(selectedOrder));
        });
        
        $select.on('select2:unselect', function(e) {
            selectedOrder = selectedOrder.filter(id => id !== e.params.data.id);
            $('#daftar_undangan_ordered').val(JSON.stringify(selectedOrder));
        });
        
        const existingRaw = '{{ detail.get("daftar_undangan_raw", "[]")|safe }}';
        try {
            if (existingRaw && existingRaw !== '[]') {
                const values = JSON.parse(existingRaw);
                selectedOrder = values;
                $('#daftar_undangan_ordered').val(JSON.stringify(selectedOrder));
                $select.val(values).trigger('change');
            }
        } catch(e) { console.error("Error parsing existing participants", e); }
    });

    function formatDateIndo(dateStr) {
        if (!dateStr) return;
        const date = new Date(dateStr);
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        
        const hari = days[date.getDay()];
        const tgl = date.getDate();
        const bulan = months[date.getMonth()];
        const tahun = date.getFullYear();
        
        document.getElementById('tgl_preview').innerText = `${hari}, ${tgl} ${bulan} ${tahun}`;
    }
</script>
{% endblock %}
