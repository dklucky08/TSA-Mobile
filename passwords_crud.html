{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-gray-200" x-data="{ 
    addOpen: false, 
    editOpen: false,
    editData: {id: '', kategori: '', keterangan: '', username: '', password: ''}
}">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6">
        <div class="flex items-center space-x-6">
            <div class="bg-red-100 p-4 rounded-2xl text-3xl">
                <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <div>
                <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">Brankas Password</h2>
                <p class="text-slate-500 text-sm font-medium">Manajemen Kredensial Aman — Edit & Hapus Aktif.</p> 
            </div>
        </div>
        <button @click="addOpen = !addOpen" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition">
            <span x-show="!addOpen">+ TAMBAH AKUN</span>
            <span x-show="addOpen">TUTUP FORM</span>
        </button>
    </div>

    <!-- FORM INPUT (TAMBAH) -->
    <div x-show="addOpen" x-cloak class="bg-slate-50 p-10 rounded-[3rem] border border-slate-100 mb-10 shadow-inner">
        <form action="/alat/passwords/save" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Kategori</label>
                <select name="kategori" required class="w-full bg-white border-0 rounded-2xl p-4 shadow-sm focus:ring-2 focus:ring-red-500 outline-none font-bold">
                    <option value="Self">Self</option><option value="Produktifity">Produktifity</option><option value="Another">Another</option><option value="Umum">Umum</option><option value="Kepegawaian">Kepegawaian</option><option value="Asset">Asset</option><option value="Perencanaan">Perencanaan</option><option value="Keuangan">Keuangan</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Nama Akun</label>
                <input type="text" name="keterangan" required placeholder="Email Dinas..." class="w-full bg-white border-0 rounded-2xl p-4 shadow-sm focus:ring-2 focus:ring-red-500 outline-none font-bold">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Username</label>
                <input type="text" name="username" required placeholder="User-Tommy" class="w-full bg-white border-0 rounded-2xl p-4 shadow-sm focus:ring-2 focus:ring-red-500 outline-none font-bold">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Password</label>
                <input type="text" name="password" required placeholder="********" class="w-full bg-white border-0 rounded-2xl p-4 shadow-sm focus:ring-2 focus:ring-red-500 outline-none font-bold">
            </div>
            <div class="md:col-span-2 flex justify-end">
                <button type="submit" class="bg-red-600 text-white px-12 py-4 rounded-2xl font-black shadow-xl hover:bg-red-700 transition">🚀 SIMPAN AKUN</button>
            </div>
        </form>
    </div>

    <!-- LIST TABLE -->
    <div class="overflow-x-auto rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden mb-10">
        <table class="min-w-full bg-white">
            <thead>
                <tr class="bg-slate-900 text-white text-[10px] uppercase tracking-widest">
                    <th class="py-6 px-6 text-left">Akun / Kategori</th>
                    <th class="py-6 px-6 text-left">Username</th>
                    <th class="py-6 px-6 text-left">Password</th>
                    <th class="py-6 px-6 text-center">Aksi</th>
                </tr>
            </thead>
            <tbody class="text-slate-600 text-sm">
                {% for p in pwds %}
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition group" x-data="{ show: false }">
                    <td class="py-5 px-6">
                        <span class="bg-slate-100 text-slate-500 text-[8px] font-black px-2 py-1 rounded-full uppercase mb-2 inline-block">{{ p.kategori }}</span>
                        <p class="font-black text-slate-800">{{ p.keterangan }}</p>
                    </td>
                    <td class="py-5 px-6 font-mono text-xs font-bold">{{ p.username }}</td>
                    <td class="py-5 px-6">
                        <div class="flex items-center space-x-2">
                            <div class="bg-slate-50 px-4 py-2 rounded-xl inline-block min-w-[120px]">
                                <template x-if="show"><span class="font-mono text-xs font-black text-red-600">{{ p.password }}</span></template>
                                <template x-if="!show"><span class="font-mono text-xs text-slate-300 tracking-[0.3em]">••••••••</span></template>
                            </div>
                            <button @click="show = !show" class="text-slate-400 hover:text-slate-600 transition">
                                <span x-show="!show">👁️</span><span x-show="show">🙈</span>
                            </button>
                        </div>
                    </td>
                    <td class="py-5 px-6 text-center">
                        <div class="flex items-center justify-center space-x-2 opacity-0 group-hover:opacity-100 transition-all">
                            <button @click="editOpen = true; editData = {id: '{{p.id}}', kategori: '{{p.kategori}}', keterangan: '{{p.keterangan}}', username: '{{p.username}}', password: '{{p.password}}'}" 
                                    class="bg-blue-50 text-blue-600 p-2.5 rounded-xl hover:bg-blue-600 hover:text-white transition">✏️</button>
                            <form action="/alat/passwords/delete/{{ p.id }}" method="POST" onsubmit="return confirm('Hapus akun ini permanen?')">
                                <button type="submit" class="bg-red-50 text-red-600 p-2.5 rounded-xl hover:bg-red-600 hover:text-white transition">🗑️</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- MODAL EDIT -->
    <div x-show="editOpen" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl relative">
            <button @click="editOpen = false" class="absolute top-8 right-8 text-slate-400 font-bold hover:text-slate-800">TUTUP</button>
            <h2 class="text-3xl font-black text-slate-800 mb-8 uppercase tracking-tighter italic">Edit Akun</h2>
            <form action="/alat/passwords/update" method="POST" class="space-y-6">
                <input type="hidden" name="id" x-model="editData.id">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Kategori</label>
                    <select name="kategori" x-model="editData.kategori" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                        <option value="Self">Self</option><option value="Produktifity">Produktifity</option><option value="Another">Another</option><option value="Umum">Umum</option><option value="Kepegawaian">Kepegawaian</option><option value="Asset">Asset</option><option value="Perencanaan">Perencanaan</option><option value="Keuangan">Keuangan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Nama Akun</label>
                    <input type="text" name="keterangan" x-model="editData.keterangan" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Username</label>
                        <input type="text" name="username" x-model="editData.username" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Password</label>
                        <input type="text" name="password" x-model="editData.password" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                    </div>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-lg shadow-xl hover:bg-black transition transform hover:-translate-y-1">
                    ✅ PERBARUI KREDENSIAL
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
